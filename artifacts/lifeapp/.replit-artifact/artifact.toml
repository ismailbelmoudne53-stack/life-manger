kind = "web"
previewPath = "/"
title = "LifeApp — All-in-One Life Platform"
version = "1.0.0"
id = "artifacts/lifeapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25676

[services.development]
run = "pnpm --filter @workspace/lifeapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifeapp", "run", "build" ]
publicDir = "artifacts/lifeapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25676"
BASE_PATH = "/"
